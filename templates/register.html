<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إنشاء حساب | BoostForge</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#070d1c; --panel:#0f1729; --panel-2:#111c33; --border:rgba(255,255,255,0.06); --text:#fff; --muted:rgba(255,255,255,0.6); --accent:#3b82f6; --accent-2:#00d4ff; }
        [data-theme="light"] { --bg:#f4f6fb; --panel:#fff; --panel-2:#f8fafc; --border:rgba(0,0,0,0.08); --text:#0b1121; --muted:rgba(11,17,33,0.6); }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px;
            background-image: radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.3), transparent 50%), radial-gradient(1px 1px at 80% 30%, rgba(255,255,255,0.2), transparent 50%), radial-gradient(1px 1px at 30% 70%, rgba(255,255,255,0.25), transparent 50%); background-size: 600px 600px; }
        [data-theme="light"] body { background-image: none; }
        .card { background: var(--panel); padding: 32px 28px; border-radius: 22px; width: 100%; max-width: 400px; text-align: center; border: 1px solid var(--border); }
        .brand-row { display: flex; flex-direction: column; align-items: center; gap: 8px; margin-bottom: 18px; }
        .brand-row img { height: 48px; width: 48px; border-radius: 12px; object-fit: cover; }
        .brand-row .name { font-weight: 900; font-size: 20px; }
        h2 { color: var(--text); margin: 0 0 18px; font-size: 19px; }
        input { width: 100%; padding: 13px 14px; margin: 7px 0; border-radius: 12px; border: 1px solid var(--border); background: var(--panel-2); color: var(--text); font-family: 'Cairo', sans-serif; font-size: 14px; }
        input:focus { outline: none; border-color: var(--accent); }
        .btn { width: 100%; padding: 13px; border-radius: 12px; border: none; background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; font-weight: 800; cursor: pointer; margin-top: 12px; font-family: 'Cairo', sans-serif; font-size: 15px; box-shadow: 0 4px 14px rgba(59,130,246,0.35); }
        a { color: var(--muted); text-decoration: none; font-size: 13px; display: block; margin-top: 14px; }
        a:hover { color: var(--accent-2); }
    </style>
</head>
<body>
    <div class="card">
        <div class="brand-row">
            <img src="/static/logo.png" alt="BoostForge">
            <div class="name">BoostForge</div>
        </div>
        <h2>إنشاء حساب جديد</h2>
        {% if error %}<div style="background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.4);color:#ef4444;padding:10px;border-radius:10px;font-size:13px;font-weight:700;margin-bottom:8px;">{{ error }}</div>{% endif %}
        <form method="POST">
            <input type="text" name="name" placeholder="الاسم الكامل" required>
            <input type="email" name="email" placeholder="البريد الإلكتروني" required>
            <input type="password" name="password" placeholder="كلمة المرور" required>
            <button type="submit" class="btn">تسجيل</button>
        </form>
        <a href="/login">لديك حساب؟ سجّل دخولك</a>
        <a href="/">← العودة للرئيسية</a>
    </div>
    <script>
        const t = localStorage.getItem('bf_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
    </script>
</body>
</html>
