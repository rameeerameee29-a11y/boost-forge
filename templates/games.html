<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الألعاب | BoostForge</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg:#070d1c; --panel:#0f1729; --panel-2:#111c33; --border:rgba(255,255,255,0.06); --text:#fff; --muted:rgba(255,255,255,0.6); --accent:#3b82f6; --accent-2:#00d4ff; --gold:#d4af37; }
        [data-theme="light"] { --bg:#f4f6fb; --panel:#fff; --panel-2:#f8fafc; --border:rgba(0,0,0,0.08); --text:#0b1121; --muted:rgba(11,17,33,0.6); }
        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; margin: 0;
            background-image: radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.3), transparent 50%), radial-gradient(1px 1px at 80% 30%, rgba(255,255,255,0.2), transparent 50%), radial-gradient(1px 1px at 30% 70%, rgba(255,255,255,0.25), transparent 50%); background-size: 600px 600px; }
        [data-theme="light"] body { background-image: none; }
        .container { width: 94%; max-width: 1050px; margin: auto; padding-bottom: 50px; }
        header { display: flex; align-items: center; justify-content: space-between; padding: 18px 0; }
        .brand { display: flex; align-items: center; gap: 10px; font-weight: 900; font-size: 17px; }
        .brand img { height: 32px; width: 32px; border-radius: 8px; object-fit: cover; }
        .back { color: var(--accent-2); text-decoration: none; font-weight: 700; font-size: 14px; padding: 8px 14px; border: 1px solid var(--border); border-radius: 12px; background: var(--panel); }
        .page-title { text-align: center; margin: 4px 0 28px; }
        .page-title h1 { font-size: 28px; font-weight: 900; margin: 0 0 6px; }
        .page-title p { color: var(--muted); font-size: 14px; margin: 0; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        @media (min-width: 560px) { .grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 850px) { .grid { grid-template-columns: repeat(4, 1fr); } }
        .game-card {
            background: var(--panel); border: 1px solid var(--border); border-radius: 20px;
            padding: 22px 14px 18px; text-align: center; text-decoration: none; color: var(--text);
            display: flex; flex-direction: column; align-items: center; gap: 10px;
            transition: 0.25s; position: relative; overflow: hidden;
        }
        .game-card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(0,0,0,0.45); }
        .game-icon {
            width: 80px; height: 80px; border-radius: 20px; display: flex;
            align-items: center; justify-content: center; font-size: 38px;
        }
        .game-name { font-weight: 900; font-size: 15px; line-height: 1.3; }
        .game-name-ar { font-size: 12px; color: var(--muted); font-weight: 600; }
        .from-price {
            border-radius: 10px; padding: 4px 12px; font-size: 12px; font-weight: 800;
            background: rgba(0,212,255,0.1); color: var(--accent-2);
        }
        .pkgs-count { font-size: 11px; color: var(--muted); }
        .accent-bar { position: absolute; top: 0; right: 0; left: 0; height: 3px; border-radius: 20px 20px 0 0; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <a href="/" class="back">→ الرئيسية</a>
            <div class="brand"><img src="/static/logo.png" alt=""> BoostForge</div>
            <div style="width:90px;"></div>
        </header>

        <div class="page-title">
            <h1>🎮 قسم الألعاب</h1>
            <p>اشحن لعبتك المفضلة بأفضل الأسعار — توصيل فوري</p>
        </div>

        <div class="grid">
            {% for game in games %}
            <a href="/games/{{ game.id }}" class="game-card">
                <div class="accent-bar" style="background: {{ game.color }};"></div>
                <div class="game-icon" style="background: {{ game.color }}22;">
                    {{ game.emoji }}
                </div>
                <div>
                    <div class="game-name">{{ game.name }}</div>
                    <div class="game-name-ar">{{ game.name_ar }}</div>
                </div>
                <div class="from-price">من {{ '%.2f'|format(game.packages[0].price) }}$</div>
                <div class="pkgs-count">{{ game.packages|length }} باقة متاحة</div>
            </a>
            {% endfor %}
        </div>
    </div>

    <script>
        const t = localStorage.getItem('bf_theme') || 'dark';
        document.documentElement.setAttribute('data-theme', t);
    </script>
</body>
</html>
